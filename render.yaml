services:
  - type: web
    name: line-bot-156
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60"
    autoDeploy: true
    envVars:
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: RELOAD_TOKEN
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.9
